<script>

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(() => console.log('Service Worker registrado'))
    .catch(err => console.error(err));
}
    let filtroEstado="todos"
let editandoIndex = null
let items=[]
let historial=JSON.parse(localStorage.getItem('historial')||"[]")
let numero = historial.length ? historial[historial.length-1].numero+1 : 1
function filtrarEstado(estado){

filtroEstado=estado

cargarHistorial()

}
function moneda(v){
return Number(v).toLocaleString("es-AR",{style:"currency",currency:"ARS"})
}

function numeroFormateado(n){
return String(n).padStart(4,'0')
}

function agregarItem() {
    let desc = document.getElementById('desc').value;
    let cantidad = parseFloat(document.getElementById('cantidad').value);
    let precio = parseFloat(document.getElementById('precio').value);
    let unidad = document.getElementById('unidad').value;

    if (!desc || !unidad) {
        alert("Selecciona producto y medida");
        return;
    }

    if (!cantidad || cantidad <= 0) {
        alert("Ingresa cantidad válida");
        return;
    }

    if (!precio || precio <= 0) {
        alert("Ingresa precio válido");
        return;
    }

    // guardar descripcion para autocompletado futuro
    let descs = JSON.parse(localStorage.getItem('descripciones') || "[]");
    if (!descs.includes(desc)) {
        descs.push(desc);
        localStorage.setItem('descripciones', JSON.stringify(descs));
        cargarDescripciones();
    }

    let totalItem = precio * cantidad;

    items.push({ desc, cantidad, precio, unidad, totalItem });

    renderTabla();
    actualizarTotal();

    // Limpiar campos después de agregar item
    document.getElementById('desc').value = "";
    document.getElementById('cantidad').value = "";
    document.getElementById('unidad').value = "";
    document.getElementById('precio').value = "";
}
function revisarVencimientos() {
    let historial = JSON.parse(localStorage.getItem('historial') || "[]");
    let hoy = new Date();

    historial.forEach(p => {
        let venc = new Date(p.vencimiento.split("/").reverse().join("-")); // dd/mm/yyyy a yyyy-mm-dd
        let diasRestantes = Math.ceil((venc - hoy) / (1000 * 60 * 60 * 24));

        if(diasRestantes < 0 && p.estado === "Pendiente") {
            p.estado = "Vencido";
        } else if(diasRestantes <= 3 && p.estado === "Pendiente") {
            p.estado = "Próximo a vencer"; // Nuevo estado
        }
    });

    localStorage.setItem('historial', JSON.stringify(historial));
    cargarHistorial();
}
let draggedIndex = null;

function dragStart(e) {
    draggedIndex = e.currentTarget.dataset.index;
    e.dataTransfer.effectAllowed = 'move';
    e.currentTarget.style.opacity = '0.5';
}

function dragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
}

function drop(e) {
    e.preventDefault();
    let targetIndex = e.currentTarget.dataset.index;
    if (draggedIndex === null || draggedIndex === targetIndex) return;

    // Reordenar items
    let draggedItem = items[draggedIndex];
    items.splice(draggedIndex, 1); // removemos
    items.splice(targetIndex, 0, draggedItem); // insertamos en nuevo lugar

    renderTabla();
}
function eliminarProducto() {
    let select = document.getElementById("desc");
    let nombre = select.value;

    if (!nombre) {
        alert("Selecciona un producto para eliminar");
        return;
    }

    if (!confirm(`¿Eliminar el producto "${nombre}"?`)) return;

    // Obtener lista de productos
    let productos = JSON.parse(localStorage.getItem("productos") || "[]");

    // Verificar si existe
    if (!productos.some(p => p.nombre === nombre)) {
        alert("El producto no existe");
        return;
    }

    // Filtrar y guardar
    productos = productos.filter(p => p.nombre !== nombre);
    localStorage.setItem("productos", JSON.stringify(productos));

    // Recargar select y limpiar inputs
    cargarProductos();
    document.getElementById("productoNombre").value = "";
    document.getElementById("productoPrecio").value = "";
    select.value = ""; // reset del select
}
function dragEnd(e) {
    e.currentTarget.style.opacity = '1';
    draggedIndex = null;
}
function renderTabla() {
    let tbody = document.querySelector('#tabla tbody');
    tbody.innerHTML = "";

    items.forEach((i, index) => {
        let row = document.createElement('tr');
        row.setAttribute('draggable', true); // Habilita arrastrar
        row.dataset.index = index; // Guardamos el índice original

        row.innerHTML = `
            <td><input value="${i.desc}" onchange="editarItem(${index},'desc',this.value)"></td>
            <td><input type="number" value="${i.cantidad}" onchange="editarItem(${index},'cantidad',this.value)" style="width:70px"></td>
            <td>
                <select onchange="editarItem(${index},'unidad',this.value)">
                    <option value="kg" ${i.unidad=="kg"?"selected":""}>kg</option>
                    <option value="m" ${i.unidad=="m"?"selected":""}>m</option>
                    <option value="m2" ${i.unidad=="m2"?"selected":""}>m²</option>
                    <option value="unidad" ${i.unidad=="unidad"?"selected":""}>unidad</option>
                    <option value="litro" ${i.unidad=="litro"?"selected":""}>litro</option>
                </select>
            </td>
            <td><input type="number" value="${i.precio}" onchange="editarItem(${index},'precio',this.value)" style="width:90px"></td>
            <td>${moneda(i.totalItem)}</td>
            <td><button class="delete" onclick="eliminar(${index})">X</button></td>
        `;

        // Eventos de drag
        row.addEventListener('dragstart', dragStart);
        row.addEventListener('dragover', dragOver);
        row.addEventListener('drop', drop);
        row.addEventListener('dragend', dragEnd);

        tbody.appendChild(row);
    });
}
function editarItem(index,campo,valor){

if(campo==="cantidad" || campo==="precio"){
items[index][campo]=parseFloat(valor)
}else{
items[index][campo]=valor
}

items[index].totalItem=items[index].cantidad*items[index].precio

renderTabla()
actualizarTotal()

}


function eliminar(i){items.splice(i,1);renderTabla();actualizarTotal()}

function actualizarTotal(){

let subtotal=items.reduce((s,i)=>s+i.totalItem,0)

let descuento=parseFloat(document.getElementById("descuento")?.value || 0)

let total=subtotal-(subtotal*(descuento/100))

document.getElementById('total').innerText=moneda(total)

}

function guardarPresupuesto(){

let cliente=document.getElementById('cliente').value
let subtotal=items.reduce((s,i)=>s+i.totalItem,0)

let descuento=parseFloat(document.getElementById("descuento").value || 0)

let total=subtotal-(subtotal*(descuento/100))
let fecha=new Date().toLocaleDateString()
if(!cliente){
alert("Debes ingresar un cliente")
return
}

if(items.length==0){
alert("Agrega al menos un item")
return
}
let vencimiento=new Date(Date.now()+15*86400000).toLocaleDateString()

let historial=JSON.parse(localStorage.getItem('historial')||"[]")

if(editandoIndex!==null){

historial[editandoIndex]={
numero:historial[editandoIndex].numero,
cliente,
subtotal,
descuento,
total,
fecha,
vencimiento,
estado:historial[editandoIndex].estado,
items
}

editandoIndex=null

}else{

historial.push({
numero,
cliente,
subtotal,
descuento,
total,
fecha,
vencimiento,
estado:"Pendiente",
items
})

numero++
localStorage.setItem('presupuesto_num',numero)

}

localStorage.setItem('historial',JSON.stringify(historial))

actualizarDashboard()
cargarHistorial()
items=[]
renderTabla()
actualizarTotal()

document.getElementById("cliente").value=""
document.getElementById("desc").value=""
document.getElementById("descuento").value=0
}

if(productos.some(p=>p.nombre===nombre)){

function rechazar(i){

historial[i].estado="Rechazado"

cargarHistorial()

function cargarHistorial() {
    let q = document.getElementById('buscar').value.toLowerCase();
    let historial = JSON.parse(localStorage.getItem('historial') || "[]");
    let cont = document.getElementById('historial');

    cont.innerHTML = "";

    historial.slice().reverse().forEach((p, i) => {

        // Filtrado por estado
        if (filtroEstado !== "todos" && p.estado !== filtroEstado) return;

        let numeroConCeros = numeroFormateado(p.numero);

        // Filtrado por cliente o número
        if (q && !p.cliente.toLowerCase().includes(q) && !numeroConCeros.includes(q)) return;

        let div = document.createElement('div');
        div.className = 'history-item';
        let hoy = new Date();
        let venc = new Date(p.vencimiento.split("/").reverse().join("-"));

        if (hoy > venc && p.estado === "Pendiente") {
            p.estado = "Vencido";
            localStorage.setItem('historial', JSON.stringify(historial));
        }

        div.innerHTML = `
        <div>
            <strong>#${numeroConCeros}</strong> ${p.cliente}
            <div>
                Fecha ${p.fecha} • vence ${p.vencimiento} • ${moneda(p.total)} • 
                <span class="estado estado-${(p.estado || "pendiente").toLowerCase()}">
                ${p.estado || "Pendiente"}
                </span>
            </div>
        </div>
        <div>
            <button class="icon-btn" title="Duplicar" onclick="duplicar(${historial.length-1-i})">📄Duplicar</button>
            <button class="icon-btn" title="Editar" onclick="editar(${historial.length-1-i})">✏️Editar</button>
            <button class="icon-btn" title="Aprobar" onclick="aprobar(${historial.length-1-i})">✅Aprobar</button>
            <button class="icon-btn" title="Rechazar" onclick="rechazar(${historial.length-1-i})">❌ Rechazar</button>
            <button class="icon-btn delete" title="Eliminar" onclick="eliminarPresupuesto(${historial.length-1-i})">🗑️Borrar</button>
        </div>`;

        cont.appendChild(div);
    });
}

function duplicar(i){

let p=historial[i]

items=[...p.items]

document.getElementById('cliente').value=p.cliente

document.getElementById('descuento').value = p.descuento || 0

renderTabla()

actualizarTotal()

}

}


function eliminarPresupuesto(i){

historial.splice(i,1)
localStorage.setItem('historial',JSON.stringify(historial))
cargarHistorial()
}

function guardarCliente(){
    let nombre = document.getElementById('cliente').value
    let email = document.getElementById('email').value

    let clientes = JSON.parse(localStorage.getItem('clientes') || "[]")
    if(clientes.some(c => c.nombre.toLowerCase() === nombre.toLowerCase())){
        alert("Cliente ya existe")
        return
    }
    clientes.push({nombre, email})
    localStorage.setItem('clientes', JSON.stringify(clientes))

    cargarClientes()

    // Limpiar campos
    document.getElementById('cliente').value = ""
    document.getElementById('email').value = ""
}

let clientes=JSON.parse(localStorage.getItem('clientes')||"[]")
clientes.splice(index,1)
localStorage.setItem('clientes',JSON.stringify(clientes))

cargarClientes()
